version: "3.9"

services:
  api:
    environment:
      - OPENROUTER_API_KEY=
      - OPENROUTER_BASE_URL=https://openrouter.ai/api/v1

    # PostgreSQL Database
    postgres:
      image: postgres:15-alpine
      container_name: micromarket-postgres
      environment:
        POSTGRES_USER: micromarket
        POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
        POSTGRES_DB: micromarket
      volumes:
        - postgres_data:/var/lib/postgresql/data
        - ./backend/migrations:/docker-entrypoint-initdb.d
      ports:
        - "5432:5432"
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U micromarket"]
        interval: 10s
        timeout: 5s
        retries: 5
      networks:
        - micromarket-network
      restart: unless-stopped

    # Redis Cache
    redis:
      image: redis:7-alpine
      container_name: micromarket-redis
      command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
      volumes:
        - redis_data:/data
      ports:
        - "6379:6379"
      healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 10s
        timeout: 5s
        retries: 5
      networks:
        - micromarket-network
      restart: unless-stopped

    # FastAPI Backend
    api:
      build:
        context: ./backend
        dockerfile: Dockerfile
      container_name: micromarket-api
      environment:
        DATABASE_URL: postgresql+asyncpg://micromarket:${DB_PASSWORD:-secure_password}@postgres:5432/micromarket
        REDIS_HOST: redis
        REDIS_PORT: 6379
        REDIS_DB: 0
        SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
        LOG_LEVEL: INFO
        ENVIRONMENT: ${ENVIRONMENT:-development}
        CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      ports:
        - "8000:8000"
      depends_on:
        postgres:
          condition: service_healthy
        redis:
          condition: service_healthy
      volumes:
        - ./backend/app:/app/app
        - uploads_data:/app/uploads
      networks:
        - micromarket-network
      command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      restart: unless-stopped

    # Celery Worker
    worker:
      build:
        context: ./backend
        dockerfile: Dockerfile
      container_name: micromarket-worker
      environment:
        DATABASE_URL: postgresql+asyncpg://micromarket:${DB_PASSWORD:-secure_password}@postgres:5432/micromarket
        REDIS_HOST: redis
        REDIS_PORT: 6379
        REDIS_DB: 0
        LOG_LEVEL: INFO
      depends_on:
        - postgres
        - redis
      volumes:
        - ./backend/app:/app/app
        - uploads_data:/app/uploads
      networks:
        - micromarket-network
      command: celery -A app.tasks worker --loglevel=info --concurrency=4
      restart: unless-stopped

    # Nginx Reverse Proxy
    nginx:
      image: nginx:alpine
      container_name: micromarket-nginx
      ports:
        - "80:80"
        - "443:443"
      volumes:
        - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
        - ./frontend/dist:/usr/share/nginx/html:ro
      depends_on:
        - api
      networks:
        - micromarket-network
      restart: unless-stopped

  volumes:
    postgres_data:
    redis_data:
    uploads_data:

  networks:
    micromarket-network:
      driver: bridge
